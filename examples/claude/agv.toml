# Claude Code AI coding agent VM.
#
# Equivalent command-line:
#   agv create --include devtools --include claude <name>

[base]
from = "ubuntu-24.04"  # also works: "debian-12", "fedora-43"
include = ["devtools", "claude"]
spec = "large"  # 8G RAM, 4 vCPUs, 40G disk  (run `agv specs` to see all)

# Override individual resource settings if needed:
# [vm]
# memory = "16G"
# cpus = 8
# disk = "80G"

# ── Auth ─────────────────────────────────────────────────────────────────────
# Skip the manual `/login` step by setting ANTHROPIC_API_KEY in your shell or
# in a .env file next to this one before running `agv create`. The claude
# mixin exports it into the VM user's shell rc files automatically. If you
# don't, agv prints a manual_steps line telling you to run `claude /login`
# inside the VM.

# ── Repo access ──────────────────────────────────────────────────────────────
# See docs/repo-access.md for the full picture (PAT via gh, SSH key, deploy
# key, agent forwarding). Two quick options:
#
# Option A — gh CLI with a personal access token:
#   Add "gh" to the include list above and put GH_TOKEN=ghp_... in a .env
#   file next to this one. agv runs `gh auth login --with-token` for you.
#
# Option B — SSH key:
#   Add "ssh-key" to the include list above and set
#   SSH_KEY=/path/to/private/key in your .env. agv copies the key in,
#   chmods it, and derives the matching .pub.
