# Claude Code AI coding agent VM.
#
# Equivalent command-line:
#   agv create --include devtools --include claude <name>

[base]
from = "ubuntu-24.04"
include = ["devtools", "claude"]
spec = "large"  # 8G RAM, 4 vCPUs, 40G disk  (run `agv specs` to see all)

# Override individual resource settings if needed:
# [vm]
# memory = "16G"
# cpus = 8
# disk = "80G"
