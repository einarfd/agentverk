# VM that authenticates to GitHub and clones a private repository.
#
# Requires a GitHub token in .env (see repo-checkout/.env.example).
# See docs/repo-access.md for alternative authentication approaches.
#
# Equivalent command-line (token must be in environment):
#   agv create --include devtools --include gh --include claude \
#               --spec large --start <name>

[base]
from    = "ubuntu-24.04"
include = ["devtools", "gh", "claude"]
spec    = "large"  # 8G RAM, 4 vCPUs, 40G disk  (run `agv specs` to see all)

# Copy dotfiles from the host (optional — remove if not needed).
[[files]]
source = "{{HOME}}/.gitconfig"
dest   = "~/.gitconfig"

# Authenticate with GitHub using a token from .env or the environment.
# The token is passed via stdin so it does not appear in the process list.
[[provision]]
run = "gh auth login --with-token <<< '{{GITHUB_TOKEN}}'"

# Configure git's credential helper so plain `git` commands also authenticate.
# Must run after `gh auth login`.
[[provision]]
run = "gh auth setup-git"

# Clone your repository.
[[provision]]
run = "gh repo clone org/myrepo ~/myrepo"

# Run any project-specific setup.
[[provision]]
run = "cd ~/myrepo && ./bootstrap.sh"
