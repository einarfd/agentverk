# Gemini CLI AI coding agent VM.
# Requires Node.js — the nodejs mixin is included automatically.
#
# Equivalent command-line:
#   agv create --include devtools --include nodejs --include gemini <name>

[base]
from = "ubuntu-24.04"
include = ["devtools", "nodejs", "gemini"]
spec = "large"  # 8G RAM, 4 vCPUs, 40G disk  (run `agv specs` to see all)

# Override individual resource settings if needed:
# [vm]
# memory = "16G"
# cpus = 8
# disk = "80G"

# ── Repo access ──────────────────────────────────────────────────────────────
# To give the agent access to your repositories, see docs/repo-access.md.
# Quick start: add "gh" to the include list above, put GITHUB_TOKEN=ghp_...
# in a .env file next to this one, then uncomment:
#
# [[provision]]
# run = [
#   "gh auth login --with-token <<< '{{GITHUB_TOKEN}}'",
#   "gh auth setup-git",                    # configure git credential helper
#   "gh repo clone org/myrepo ~/myrepo",
# ]
