# OpenClaw AI gateway VM.
# Requires Node.js 22+ — the nodejs mixin is included automatically.
#
# Equivalent command-line:
#   agv create --include devtools --include nodejs --include openclaw <name>

[base]
from = "ubuntu-24.04"
include = ["devtools", "nodejs", "openclaw"]
spec = "large"  # 8G RAM, 4 vCPUs, 40G disk  (run `agv specs` to see all)

# Override individual resource settings if needed:
# [vm]
# memory = "16G"
# cpus = 8
# disk = "80G"
