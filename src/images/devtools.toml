# Development tools mixin.
# Installs git, curl, git-delta, build tools, fzf, direnv.
# Use via: include = ["devtools"]

[os_families.debian]
[[os_families.debian.setup]]
run = "apt-get update && apt-get install -y git git-delta curl build-essential fzf direnv"

[os_families.fedora]
[[os_families.fedora.setup]]
run = "dnf install -y git git-delta curl gcc gcc-c++ make fzf direnv"
