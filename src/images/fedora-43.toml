# Base Fedora 43 Cloud Base (Generic) image.
# Pinned to the 1.6 release build for reproducibility. Uses dnf, systemd,
# and glibc. Default user inside the image is `fedora`, but agv creates
# the `agent` user via cloud-init regardless.

[base]
os_family = "fedora"

