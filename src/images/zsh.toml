# Zsh mixin.
# Installs zsh and sets it as the default shell for the VM user.
# Use via: include = ["zsh"]

[os_families.debian]
[[os_families.debian.setup]]
run = "apt-get update && apt-get install -y zsh && chsh -s $(command -v zsh) {{AGV_USER}}"

[os_families.fedora]
[[os_families.fedora.setup]]
run = "dnf install -y zsh util-linux-user && chsh -s $(command -v zsh) {{AGV_USER}}"
