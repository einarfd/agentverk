# Oh My Zsh mixin.
# Installs oh-my-zsh on top of zsh. Depends on the `zsh` mixin, which
# handles zsh installation + setting it as the default shell. Family
# support is inherited from zsh — adding a family there automatically
# enables oh-my-zsh there too.
#
# Use via: include = ["oh-my-zsh"]
# If you provide dotfiles via [[provision]], run this mixin first so
# oh-my-zsh's ~/.zshrc can be overwritten by yours.

[base]
include = ["zsh"]

[[provision]]
run = """sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended"""
