# OpenAI Codex CLI mixin.
# Installs the official Codex CLI from OpenAI GitHub releases.
# Uses the Rust binary — no Node.js required.
# Supports x86_64 and aarch64.
# Use via: include = ["codex"]

notes = [
  "Installs OpenAI Codex CLI (`codex`) to `/usr/local/bin`.",
]

[[provision]]
run = """
ARCH=$(uname -m)
TMP=$(mktemp -d)
curl -fsSL "https://github.com/openai/codex/releases/latest/download/codex-${ARCH}-unknown-linux-musl.tar.gz" | tar -xz -C "$TMP"
sudo install -m 755 "$TMP/codex-${ARCH}-unknown-linux-musl" /usr/local/bin/codex
rm -rf "$TMP"
"""

# Codex reads `~/.codex/AGENTS.md` at every session start but has no
# file-include syntax, so instead of a pointer line we symlink AGENTS.md
# to the agv-generated system info. Only creates the link when nothing
# is there, so a user-authored AGENTS.md is never clobbered. On retry,
# the symlink is already present and -e short-circuits.
[[provision]]
run = "mkdir -p ~/.codex && [ -e ~/.codex/AGENTS.md ] || ln -s ~/.agv/system.md ~/.codex/AGENTS.md"
